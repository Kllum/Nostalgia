<!DOCTYPE html>
  <html lang="pt-br">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>Caderno de Respostas</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Caveat:wght@400;500&display=swap" rel="stylesheet">
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink:    #1430a8;
    --ink2:   #2040cc;
    --paper:  #faf7ee;
    --rule:   #a8bee8;
    --margin: #f0a0a0;
    --rule-h: 34px;
  }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--paper); touch-action:none; }
  .page {
    position:fixed; inset:0; overflow:hidden;
    background:
      linear-gradient(to right, transparent 54px, var(--margin) 54px, var(--margin) 56px, transparent 56px),
      repeating-linear-gradient(to bottom,
        var(--paper) 0px, var(--paper) calc(var(--rule-h) - 1px),
        var(--rule) calc(var(--rule-h) - 1px), var(--rule) var(--rule-h));
  }
  .spirals { display:flex; align-items:center; gap:18px; height:var(--rule-h); padding-left:68px; padding-right:10px; overflow:hidden; }
  .shole { flex-shrink:0; width:13px; height:13px; border-radius:50%; background:white; border:2px solid #bbb; box-shadow:inset 0 1px 3px rgba(0,0,0,.18); }
  .ink-area { position:absolute; top:var(--rule-h); left:0; right:0; bottom:0; padding-left:66px; padding-right:18px; padding-top:8px; }
  .ink-area.q-scroll { overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:80px; }
  .hw  { font-family:'Dancing Script',cursive; font-weight:700; color:var(--ink); }
  .hw-line { display:block; height:var(--rule-h); line-height:var(--rule-h); font-size:28px; white-space:nowrap; overflow:hidden; }
  .hw-line.lg { font-size:28px; }
  .hw-line.sm { font-size:22px; font-family:'Caveat',cursive; color:var(--ink2); }
  .hw-line.wrap { height:auto; min-height:var(--rule-h); white-space:normal; overflow:visible; word-break:break-word; }
  .hw-line .ch { display:inline; opacity:0; transition:opacity 0.18s ease; }
  .hw-line .ch.on { opacity:1; }
  .hw-line .reveal { display:inline-block; clip-path:inset(0 100% 0 0); }
  .hw-line.wrap .reveal { display:block; width:100%; }
  #bic { position:fixed; pointer-events:none; z-index:9999; display:none; width:190px; height:auto; mix-blend-mode:multiply; }
  .btn { font-family:'Dancing Script',cursive; font-weight:700; font-size:26px; color:var(--ink); background:transparent; border:2px solid var(--ink); border-radius:8px; padding:6px 26px; cursor:pointer; opacity:0; pointer-events:none; transform:translateY(6px); transition:opacity .4s,transform .4s,background .2s; margin-top:6px; }
  .btn.show { opacity:1; pointer-events:auto; transform:translateY(0); }
  .btn:hover { background:rgba(20,48,168,.07); }
  .btn:active { transform:scale(.97); }
  .btn-reset { font-family:'Caveat',cursive; font-size:14px; color:rgba(20,48,168,.12); background:transparent; border:1px solid rgba(20,48,168,.08); border-radius:6px; padding:3px 10px; cursor:pointer; position:fixed; bottom:10px; left:50%; transform:translateX(-50%); }
  .doodles { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .q-meta { font-family:'Caveat',cursive; font-size:15px; color:rgba(20,48,168,.45); height:var(--rule-h); line-height:var(--rule-h); display:block; }
  .prev-lbl { font-family:'Caveat',cursive; font-size:14px; color:rgba(20,48,168,.5); height:calc(var(--rule-h)*.6); line-height:calc(var(--rule-h)*.6); display:block; opacity:0; transition:opacity .4s; margin-top:8px; }
  .prev-lbl.show { opacity:1; }
  .ta-wrap { display:block; margin-top:6px; opacity:0; transform:translateY(4px); transition:opacity .35s,transform .35s; }
  .ta-wrap.show { opacity:1; transform:translateY(0); }
  textarea { font-family:'Dancing Script',cursive; font-weight:700; font-size:28px; color:var(--ink); background:transparent; border:none; border-bottom:2px dashed var(--rule); outline:none; width:100%; resize:none; padding:2px 0; line-height:var(--rule-h); caret-color:var(--ink); -webkit-appearance:none; }
  textarea::placeholder { color:rgba(20,48,168,.25); font-size:24px; }
  .prog { position:fixed; bottom:12px; right:12px; display:flex; gap:5px; align-items:center; }
  .pd { width:6px; height:6px; border-radius:50%; background:var(--rule); transition:background .3s; }
  .pd.done { background:var(--ink); }
  .pd.cur  { background:var(--ink2); width:8px; height:8px; }
  .fade-in  { animation:fi .35s ease both; }
  @keyframes fi  { from{opacity:0;transform:translateX(14px)} to{opacity:1;transform:translateX(0)} }
  .fade-out { animation:fo .3s ease both; }
  @keyframes fo  { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(-14px)} }
  .all-wrap { position:absolute; inset:0; top:var(--rule-h); left:0; right:0; bottom:0; padding-left:66px; padding-right:18px; padding-top:8px; overflow-y:auto; }
  @media (max-width:480px) {
    .hw-line, .hw-line.lg, .hw-line.wrap, textarea { font-size:22px; }
    textarea::placeholder { font-size:20px; }
  }
  </style>
  </head>

  function hideBic() { bic.style.display="none"; }

  function revealLine(el, text, mpc) {
    mpc = mpc||55;
    return new Promise(resolve => {
      el.textContent = text;
      el.style.clipPath = "inset(0 100% 0 0)";
      var total = text.length * mpc, t0 = performance.now();
      function tick(now) {
        var p = Math.min((now-t0)/total, 1);
        el.style.clipPath = "inset(0 "+((1-p)*100).toFixed(2)+"% 0 0)";
        var r = el.getBoundingClientRect();
        moveBic(r.left + r.width*p + 4, r.top + r.height*0.75);
        if (p<1) requestAnimationFrame(tick);
        else { el.style.clipPath="none"; hideBic(); setTimeout(resolve,80); }
      }
      var r = el.getBoundingClientRect();
      showBic(r.left, r.top+r.height*0.75);
      requestAnimationFrame(tick);
    });
  }

  var introIdx=0;
  async function showIntro(idx) {
    introIdx=idx;
    var pg=INTRO_PAGES[idx], isFirst=idx===0, n=pg.lines.length;
    var linesHtml=pg.lines.map(function(_,i){ return '<div class="hw hw-line lg" id="il'+i+'"><span class="reveal" id="ir'+i+'"></span></div>'; }).join("");
    buildPage(
      linesHtml+
      '<button class="btn hw" id="ibtn" onclick="'+(pg.final?'openNotebook()':'nextIntro()')+'">'+

      '<button class="btn-reset" onclick="resetAll()">reiniciar</button>',
      isFirst

  window.nextIntro = async function() {
    var page=document.querySelector('.page');
    if(page){page.classList.remove('fade-in');page.classList.add('fade-out');await pause(310);}
    showIntro(introIdx+1);
  };
  window.openNotebook = function() {
    if(data.done1 && data.done2){ showAllAnswers(); return; }
    showQuestion(0);
  };
  window.resetAll = function() {
    if(confirm("Resetar o caderno?")){ localStorage.removeItem("caderno_v4"); location.reload(); }
  };

  var curQ=0, busy=false;
  async function showQuestion(idx) {
    curQ=idx; busy=false;
    var who=data.done1?2:1;
    var q=QUESTIONS[idx];
    var prev=(who===2)?(data.p1[idx]||null):null;
    var arr=who===1?data.p1:data.p2;
    var dots=QUESTIONS.map(function(_,i){
      return '<div class="pd '+(arr[i]!==undefined?'done':'')+' '+(i===idx&&arr[i]===undefined?'cur':'')+'"></div>';
    }).join("");

    app.innerHTML=
      '<div class="page fade-in">'+
      spirals()+
      '<div class="ink-area q-scroll">'+
        '<span class="q-meta" id="qmeta"></span>'+
        '<div class="hw hw-line lg wrap"><span class="reveal" id="qr"></span></div>'+
        (prev?
          '<div class="prev-lbl" id="plbl">Pessoa 1 respondeu:</div>'+
          '<div class="hw hw-line wrap"><span class="reveal" id="prevr"></span></div>'
        :'')+
        '<div class="ta-wrap" id="tawrap">'+
          '<textarea id="ta" rows="1" placeholder="escreva aqui..."></textarea>'+
          '<button class="btn hw show" style="font-size:22px;padding:5px 20px;margin-top:2px;" onclick="submitAns()">ok ✓</button>'+
        '</div>'+
        '<div class="hw hw-line wrap" id="ansd" style="display:none"><span class="reveal" id="ansr"></span></div>'+
        '<button class="btn hw" id="nxtbtn" onclick="'+(idx<QUESTIONS.length-1?'goNext()':'finishAll()')+'">'+
        (idx<QUESTIONS.length-1?'próxima →':'finalizar ✓')+
        '</button>'+
      '</div>'+
      '</div>'+
      '<button class="btn-reset" onclick="resetAll()">reiniciar</button>';

    var progEl=document.createElement("div");
    progEl.className="prog"; progEl.innerHTML=dots;
    document.querySelector(".page").appendChild(progEl);

    var ta=document.getElementById("ta");
    if(ta){
      ta.addEventListener("input",function(){ this.style.height="auto"; this.style.height=Math.min(this.scrollHeight,120)+"px"; });
      ta.addEventListener("keydown",function(e){ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();submitAns();} });
    }

    await pause(180);
    var qm=document.getElementById("qmeta"); if(qm) qm.textContent=(idx+1)+" de "+QUESTIONS.length;
    var qr=document.getElementById("qr"); if(qr) await revealLine(qr,q,90);
    if(prev){
      var pl=document.getElementById("plbl"); if(pl){await pause(100);pl.classList.add("show");}
      var pr=document.getElementById("prevr"); if(pr){await pause(90);await revealLine(pr,prev,90);}
    }
    var tw=document.getElementById("tawrap"); if(tw){await pause(120);tw.classList.add("show");}
    setTimeout(function(){var t2=document.getElementById("ta");if(t2)t2.focus();},100);
  }

  window.submitAns = async function() {
    if(busy) return;
    var ta=document.getElementById("ta"); if(!ta) return;
    var val=ta.value.trim(); if(!val){ta.focus();return;}
    busy=true;
    var who=data.done1?2:1;
    if(who===1) data.p1[curQ]=val; else data.p2[curQ]=val;
    save();
    var tw=document.getElementById("tawrap");
    if(tw){tw.style.opacity="0";tw.style.pointerEvents="none";await pause(260);tw.style.display="none";}
    var ansd=document.getElementById("ansd"); if(ansd) ansd.style.display="block";
    var ar=document.getElementById("ansr"); if(ar) await revealLine(ar,val,90);
    await pause(180);
    showBtn(document.getElementById("nxtbtn"));
  };
  window.goNext    = function(){ showQuestion(curQ+1); };
  var FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSdwhlo8fdEGi7vjCGlY2FeBCBfhYdnQjgGCLKFCGgceTNnjGw/formResponse';

  window.finishAll = function(){
    if(!data.done1){
      data.done1=true;
    } else {
      data.done2=true;
      fetch(FORM_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'submit=Submit'
      }).catch(function(){});
    }
    save();
    showFinish();
  };

  function showFinish() {
    var msg1="Respostas salvas! ✓";
    var msg2=data.done2?"Caderno completo! ♡":"Agora é a vez da outra pessoa... ✎";
    buildPage(
      '<div style="display:flex;flex-direction:column;align-items:flex-start;justify-content:center;height:calc(100vh - 34px - 60px);gap:4px;">'+
        '<div class="hw hw-line lg"><span class="reveal" id="finr1"></span></div>'+
        '<div class="hw hw-line"><span class="reveal" id="finr2"></span></div>'+
      '</div>'+
      '<button class="btn-reset" onclick="resetAll()">reiniciar</button>'
    );
    (async function(){
      await pause(300);
      await revealLine(document.getElementById("finr1"),msg1,52);
      await pause(150);
      await revealLine(document.getElementById("finr2"),msg2,90);
    })();
  }

  async function showAllAnswers() {
    var rows=QUESTIONS.map(function(q,i){
      return '<div style="margin-top:2px;">'+
        '<span class="q-meta" style="display:block">'+(i+1)+'. '+q+'</span>'+
        (data.p1[i]?'<div class="hw hw-line wrap" id="a1-'+i+'"><span class="reveal" id="r1-'+i+'"></span></div>':'')+
        (data.p2[i]?'<div class="hw hw-line wrap" style="color:#5028b0;" id="a2-'+i+'"><span class="reveal" id="r2-'+i+'"></span></div>':'')+
      '</div>';
    }).join("");
    app.innerHTML=
      '<div class="page fade-in">'+spirals()+
      '<div class="all-wrap">'+
        '<div class="hw hw-line lg"><span class="reveal" id="allt"></span></div>'+
        rows+'<div style="height:50px;"></div>'+
      '</div></div>'+
      '<button class="btn-reset" onclick="resetAll()">reiniciar</button>';
    await pause(300);
    await revealLine(document.getElementById("allt"),"Respostas ♡",52);
    for(var i=0;i<QUESTIONS.length;i++){
      var r1=document.getElementById("r1-"+i), r2=document.getElementById("r2-"+i);
      if(r1&&data.p1[i]) await revealLine(r1,data.p1[i],90);
      if(r2&&data.p2[i]) await revealLine(r2,data.p2[i],90);
      await pause(90);
    }
  }

  if(data.done1 && data.done2){ showAllAnswers(); } else { showIntro(0); }
  </script>
